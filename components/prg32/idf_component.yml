dependencies:
  espressif/esp_websocket_client:
    version: "^1.5.0"
    require: no
    rules:
      - if: "target == esp32c6"
  espressif/esp_lcd_qemu_rgb:
    version: "^1.0.2"
    require: no
    rules:
      - if: "target == esp32c3"
  espressif/mdns:
    version: "^1.8.2"
    require: no
    rules:
      - if: "target != esp32c3"
  espressif/usb:
    version: "^2.0.0"
    require: no
    rules:
      - if: "target == esp32p4"
