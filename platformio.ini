; PRG32 PlatformIO configuration.
;
; Default target: ESP32-C6 physical board with the ILI9341 display backend.
; The QEMU screen workflow still uses the ESP-IDF commands in docs/qemu.md.

[platformio]
src_dir = main
default_envs = prg32-esp32c6

[env:prg32-esp32c6]
platform = platformio/espressif32
framework = espidf
board = esp32-c6-devkitc-1
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L
board_upload.flash_size = 4MB
board_build.partitions = partitions_prg32.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_speed = 460800
upload_protocol = esptool
