name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  host-smoke:
    name: Host smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run host smoke test
        run: bash scripts/ci_smoke_test.sh

      - name: Check portable ABI generated files
        run: python3 tools/prg32_abi_gen.py --check

  esp-idf-build:
    name: ESP-IDF firmware build
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Git workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build ESP32-C6 firmware
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32c6
          idf.py build
